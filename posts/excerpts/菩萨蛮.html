        <h1>分享《菩萨蛮》</h1>
        <p class="entry-date">2026年7月11日</p>

        <div class="entry-content">
            <p><strong>菩萨蛮 · 温庭筠</strong>（晚唐）</p>
            <p>小山重叠金明灭，鬓云欲度香腮雪。懒起画蛾眉，弄妆梳洗迟。</p>
            <p>照花前后镜，花面交相映。新帖绣罗襦，双双金鹧鸪。</p>
            <p>上片写宿妆未整、春困梳洗；下片对镜簪花，罗襦双鹧鸪，艳而含怨。录于此，作个人阅读备忘。</p>
