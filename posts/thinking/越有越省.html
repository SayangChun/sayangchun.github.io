        <h1>越有越省</h1>
        <p class="entry-date">2026年7月4日</p>

        <div class="entry-content">
            <p>当攒下比身边同学多得多的现金 / 资产时，反而会越觉得自己没有钱，越想省钱。</p>
            <p>参照系从「同学聚餐」换成「FIRE 数字」「比特币数量」「机会成本」之后，安全感阈值会上移：账面更多，目标也更大，主观上仍像穷人。这不一定坏——节制有助于积累；但要警惕变成焦虑驱动的吝啬，该投在技能、健康与长期资产上的钱，别被「越有越慌」吞掉。省的是冲动消费，不是成长杠杆。</p>
