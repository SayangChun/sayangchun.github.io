        <p class="entry-date">2026年6月19日</p>

        <div class="entry-content">
            <p>我没有那么多的实力，只会定投 BTC 和 QQQ。</p>
            <p>承认能力边界，是风控的一部分。不编故事、不硬上复杂策略，把执行压到「定期买、长期拿」。比特币与纳指 100（QQQ 等）是我愿意用时间陪伴的主线；其余大多是噪音。简单策略的优势是可重复：忙的时候不会忘，慌的时候不会乱改。实力不够用花活补，只够用纪律补。</p>
