        <h1>仓位比回撤更重要</h1>
        <p class="entry-date">2026年6月22日</p>

        <div class="entry-content">
            <p>这比担心最大回撤还重要。像我在最高点买了黄金，现在亏了 20 个点，但是我依然无所谓，因为我就投了总资产的不到 1%，甚至可以放在那里看笑话。</p>
            <p>百分比回撤吓人，乘上仓位权重才是真实痛感。1% 仓位亏 20%，整体只动 0.2%；重仓资产小回撤也可能睡不着。与其追求「永不买在高点」，不如先设计「买错了也无伤大局」。卫星仓位允许试错，核心仓位要求纪律——结构对了，心态才站得住。</p>
