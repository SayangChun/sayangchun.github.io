        <h1>熊市与态度</h1>
        <p class="entry-date">2026年6月26日</p>

        <div class="entry-content">
            <p>现在是熊市，等到牛市的时候再看，又会是另一个态度了。</p>
            <p>底部唱衰、顶部狂欢，是同一群情绪的两面。定投与长期持有要对抗的，正是这种态度漂移。熊市里嫌「死钱」、牛市里恨「买少」，都是事后视角。与其预测别人态度何时翻转，不如先固定自己的规则：买什么、买多少、何时不看盘。周期会变，流程尽量不变。</p>
