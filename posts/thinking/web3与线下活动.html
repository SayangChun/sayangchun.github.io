        <h1>Web3 与线下活动</h1>
        <p class="entry-date">2026年7月10日</p>

        <div class="entry-content">
            <p>Web3 不应该有那么多线下活动。看到这么多线下见面，我感觉这与 Web3 原本的愿景并不相符……</p>
            <p>去中心化、可远程协作、不依赖地理与人情局，本应是这套叙事里更干净的部分。当生态越来越像传统行业的展会与酒会，链上协议与信任最小化反而成了配角。我更在意代码、产品和可验证的规则，而不是线下场次本身。</p>
