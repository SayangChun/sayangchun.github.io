        <h1>投资与时间</h1>
        <p class="entry-date">2026年7月10日</p>

        <div class="entry-content">
            <p>投资不就是可以无时无刻都在赚钱的嘛。</p>
            <p>这句话听起来轻松，背后是一种时间观：不必每时每刻用劳动换取报酬，也可以让资本与仓位在你睡觉、写代码、打游戏时继续为你工作。当然，前提是选对长期资产、控制风险、接受波动——「无时无刻」指的是时间复利，不是每天盯盘赌方向。</p>
