        <h1>没事儿干，就去学英语</h1>
        <p class="entry-date">2026年6月27日</p>

        <div class="entry-content">
            <p>没事儿干，就去学英语。</p>
            <p>默认动作很重要。刷短视频也是「没事儿干」，学英语也是，复利方向完全不同。英语直接打开官方文档、论文摘要、开源 issue、国际社区与产品文案——做 AI Coding、读一级市场信息都更省事。不必每次「立 flag」学一年，空下来就打开输入：听力、阅读、写作任一即可。碎片时间有默认归宿，焦虑会少一点，能力会多一点。</p>
