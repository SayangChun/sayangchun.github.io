        <h1>只持有比特币</h1>
        <p class="entry-date">2026年7月2日</p>

        <div class="entry-content">
            <p>只持有比特币，不碰任何衍生品。因为比特币是确定的、代码写死的，而衍生品太复杂了，因为人的参与有很强的不确定性，风险太大。</p>
            <p>现货仓位的规则相对简单：总量、发行节奏、网络规则公开可查。合约、杠杆、结构化产品则叠了对手方、清算、情绪与操作空间——复杂度上来，错误成本也上来。我更愿意把精力放在能理解、能长期持有的东西上，而不是在放大镜里和波动搏斗。</p>
