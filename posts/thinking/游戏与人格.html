        <h1>游戏与人格</h1>
        <p class="entry-date">2026年6月29日</p>

        <div class="entry-content">
            <p>从喜欢玩的游戏类型中，找到自己的人格。</p>
            <p>偏单机叙事、偏竞技对抗、偏建造经营、偏开放世界探索——娱乐选择往往映射你如何处理目标、风险、社交与掌控感。不必过度解读成伪科学，但可以当自我观察的入口：你在游戏里追求的，现实里是不是也在用另一种方式追求？认识自己，有时从「爱玩什么」开始，比填一张人格测试表更诚实。</p>
