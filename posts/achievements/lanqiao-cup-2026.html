        <h1>第十七届蓝桥杯全国一等奖</h1>
        <p class="entry-date">2026年6月</p>

        <div class="entry-content">
            <p>参加第十七届蓝桥杯全国软件和信息技术专业人才大赛，Java 软件开发大学 B 组获<strong>北京市一等奖</strong>、<strong>全国一等奖</strong>。</p>
            <p>蓝桥杯侧重算法、编程与工程基础，覆盖面广。这次成绩对我来说不只是名次，而是把「数据结构、算法设计与计算机基础」从课程作业推进到可公开验证的竞赛结果——和我在简历里写的长期主义一致：技能要能被定价，而不是只停留在自我感觉良好。</p>
            <p>之后仍会持续补系统课与刷题节奏；竞赛是节点，不是终点。它也支撑我做独立产品与 AI Coding 时的底层信心：先把基础盘打牢，再谈杠杆与工具。</p>
